<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bairro Seguro | Mapa</title>
  <link rel="stylesheet" href="../assets/theme.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-mark small" aria-hidden="true"></div>
      <h1>Bairro Seguro</h1>
    </div>
    <div class="topbar-right">
      <span id="boasVindas">Ola, morador</span>
      <button id="sairBtn" type="button">Sair</button>
    </div>
  </header>

  <main class="layout">
    <section class="search-wrap">
      <input id="buscaBairro" type="text" placeholder="Buscar bairro...">
    </section>

    <section class="map-mock" aria-label="Mapa mockado do bairro">
      <div class="map-grid"></div>
      <div class="road road-a"></div>
      <div class="road road-b"></div>
      <div class="road road-c"></div>
      <div class="pin" style="top: 28%; left: 22%;"></div>
      <div class="pin" style="top: 47%; left: 58%;"></div>
      <div class="pin" style="top: 66%; left: 40%;"></div>
      <div class="mock-label">Mapa da comunidade (mock)</div>
    </section>

    <section class="occurrences">
      <div class="occurrences-title">Ocorrencias</div>
      <ul id="listaOcorrencias"></ul>
    </section>

    <section class="actions">
      <button type="button" id="relatarBtn">+ Reportar ocorrencia</button>
    </section>
  </main>

  <script src="../assets/utils.js"></script>
  <script src="script.js"></script>
</body>
</html>
