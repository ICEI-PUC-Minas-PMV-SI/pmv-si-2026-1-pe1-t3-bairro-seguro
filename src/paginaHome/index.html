<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bairro Seguro | Ocorrências</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../assets/theme.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-mark small" aria-hidden="true"></div>
      <h1>Bairro Seguro</h1>
    </div>
    <div class="topbar-right">
      <span id="boasVindas">Olá, morador</span>
      <button id="sairBtn" type="button">Sair</button>
    </div>
  </header>

  <main class="layout">
    <section class="search-wrap">
      <input id="buscaBairro" type="text" placeholder="Buscar bairro, endereço ou tipo de ocorrência...">
    </section>

    <section class="map-card" aria-label="Mapa de ocorrências">
      <div id="map"></div>
      <div class="map-hint">Busque um CEP, clique no mapa e use o emoji para registrar a ocorrência.</div>
    </section>

    <section class="occurrences">
      <div class="occurrences-header">
        <div class="occurrences-title">Ocorrências</div>
      </div>
      <ul id="listaOcorrencias"></ul>
    </section>

    <section class="actions">
      <div class="cep-row">
        <input id="cepInput" type="text" inputmode="numeric" placeholder="Digite o CEP no formato XXXXX-XXX" maxlength="9">
        <button type="button" id="buscarCepBtn">Buscar CEP</button>
      </div>

      <div id="enderecoEncontrado" class="endereco-box">
        <p id="enderecoTexto"></p>
      </div>

      <div id="formOcorrencia" class="form-occurrence">
        <select id="emojiSelect">
          <option value="">Selecione o emoji da ocorrência</option>
          <option value="🚨">🚨 Assalto/roubo</option>
          <option value="💡">💡 Iluminação apagada</option>
          <option value="🔊">🔊 Som alto/barulho</option>
          <option value="🚫">🚫 Vandalismo/dano</option>
          <option value="⚠️">⚠️ Assédio</option>
          <option value="📍">📍 Outro problema</option>
        </select>
        <textarea id="detalheInput" rows="3" placeholder="Detalhe a ocorrência (opcional)"></textarea>
        <div class="form-actions">
          <button type="button" id="relatarBtn">Relatar no mapa</button>
          <button type="button" id="limparBtn" class="btn-secondary">Limpar seleção</button>
        </div>
      </div>

      <p id="feedbackBusca" class="feedback" aria-live="polite"></p>
      <p id="feedbackRelato" class="feedback" aria-live="polite"></p>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../assets/utils.js"></script>
  <script src="script.js"></script>
</body>
</html>
